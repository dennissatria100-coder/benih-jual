<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko Benih Pertanian</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <header class="bg-green-600 text-white shadow-lg">
        <div class="container mx-auto px-4 py-6">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <i class="fas fa-seedling text-3xl"></i>
                    <h1 class="text-2xl font-bold">Toko Benih Pertanian</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <button id="cartBtn" class="relative">
                        <i class="fas fa-shopping-cart text-2xl"></i>
                        <span id="cartCount" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center text-xs font-bold">0</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="bg-gradient-to-r from-green-500 to-green-700 text-white py-16">
        <div class="container mx-auto px-4 text-center">
            <h2 class="text-4xl font-bold mb-4">Benih Berkualitas untuk Hasil Maksimal</h2>
            <p class="text-xl mb-8">Pilihan terbaik untuk pertanian modern Anda</p>
        </div>
    </section>

    <!-- Filter Section -->
    <section class="container mx-auto px-4 py-8">
        <div class="flex flex-wrap gap-4 items-center justify-between">
            <div class="flex gap-4 flex-wrap">
                <input type="text" id="searchInput" placeholder="Cari benih..." 
                    class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                <select id="categoryFilter" class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                    <option value="">Semua Kategori</option>
                </select>
            </div>
            <button id="refreshBtn" class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 transition">
                <i class="fas fa-sync-alt mr-2"></i>Refresh Data
            </button>
        </div>
    </section>

    <!-- Loading -->
    <div id="loading" class="container mx-auto px-4 py-8 text-center">
        <i class="fas fa-spinner fa-spin text-4xl text-green-600"></i>
        <p class="mt-4 text-gray-600">Memuat data...</p>
    </div>

    <!-- Products Grid -->
    <section class="container mx-auto px-4 py-8">
        <div id="productsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Products will be loaded here -->
        </div>
        <div id="noProducts" class="hidden text-center py-12">
            <i class="fas fa-box-open text-6xl text-gray-300 mb-4"></i>
            <p class="text-gray-500 text-xl">Tidak ada produk ditemukan</p>
        </div>
    </section>

    <!-- Cart Modal -->
    <div id="cartModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-lg max-w-2xl w-full max-h-[90vh] overflow-hidden">
            <div class="p-6 border-b">
                <div class="flex justify-between items-center">
                    <h3 class="text-2xl font-bold">Keranjang Belanja</h3>
                    <button id="closeCart" class="text-gray-500 hover:text-gray-700">
                        <i class="fas fa-times text-2xl"></i>
                    </button>
                </div>
            </div>
            <div id="cartItems" class="p-6 overflow-y-auto max-h-96">
                <!-- Cart items will be loaded here -->
            </div>
            <div class="p-6 border-t bg-gray-50">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-xl font-bold">Total:</span>
                    <span id="cartTotal" class="text-2xl font-bold text-green-600">Rp 0</span>
                </div>
                <button id="checkoutBtn" class="w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 transition font-bold">
                    <i class="fas fa-check mr-2"></i>Checkout via WhatsApp
                </button>
            </div>
        </div>
    </div>

    <!-- Checkout Form Modal -->
    <div id="checkoutModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-lg max-w-md w-full">
            <div class="p-6 border-b">
                <div class="flex justify-between items-center">
                    <h3 class="text-2xl font-bold">Data Pengiriman</h3>
                    <button id="closeCheckout" class="text-gray-500 hover:text-gray-700">
                        <i class="fas fa-times text-2xl"></i>
                    </button>
                </div>
            </div>
            <form id="checkoutForm" class="p-6">
                <div class="mb-4">
                    <label class="block text-gray-700 font-bold mb-2">Nama Lengkap *</label>
                    <input type="text" id="customerName" required 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
                        placeholder="Masukkan nama lengkap">
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 font-bold mb-2">No HP/WhatsApp *</label>
                    <input type="tel" id="customerPhone" required 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
                        placeholder="08123456789">
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 font-bold mb-2">Alamat Lengkap *</label>
                    <textarea id="customerAddress" required rows="3"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
                        placeholder="Masukkan alamat lengkap pengiriman"></textarea>
                </div>
                <div class="mb-6">
                    <div class="flex justify-between items-center p-4 bg-green-50 rounded-lg">
                        <span class="font-bold">Total Pembayaran:</span>
                        <span id="checkoutTotal" class="text-xl font-bold text-green-600">Rp 0</span>
                    </div>
                </div>
                <button type="submit" class="w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 transition font-bold">
                    <i class="fas fa-paper-plane mr-2"></i>Kirim Pesanan
                </button>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white mt-16 py-8">
        <div class="container mx-auto px-4 text-center">
            <p>&copy; 2024 Toko Benih Pertanian. Semua hak dilindungi.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
